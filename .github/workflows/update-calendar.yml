name: Update Manytask calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Restore Manytask session
        run: |
          cat > manytask_state.json <<'EOF'
          ${{ secrets.MANYTASK_STATE_JSON }}
          EOF

      - name: Generate ICS
        run: python manytask_to_ics.py

      - name: Commit updated ICS
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manytask.ics
          git diff --cached --quiet || git commit -m "Update manytask.ics"
          git push
